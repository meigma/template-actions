# Sample action metadata. Replace name/description/author/branding, inputs, and
# outputs with your action's real interface after creating a repo from this
# template.
#
# If your action pairs with a released CLI, pin its version here with a
# `# x-release-please-version` marker on the input default and add
#   "extra-files": [{ "type": "generic", "path": "action.yml" }]
# to release-please-config.json so releases keep it in sync.
name: The name of your action here
description: Provide a description here
author: Meigma

branding:
  icon: heart
  color: red

inputs:
  milliseconds:
    description: Your input description here
    required: true
    default: '1000'

outputs:
  time:
    description: Your output description here

runs:
  using: node24
  main: dist/index.js
